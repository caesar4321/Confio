pluginManagement {
    includeBuild('../node_modules/@react-native/gradle-plugin')
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
plugins { id("com.facebook.react.settings") }

// Autolinking: register every native module from `react-native config`
// (re-enabled 2026-07; deliberate exclusions live in react-native.config.js).
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        maven {
            url("https://raw.githubusercontent.com/didit-protocol/sdk-android/main/repository")
        }
        mavenCentral {
            // We don't want to fetch react-native from Maven Central as there are
            // older versions over there.
            content {
                excludeGroup "com.facebook.react"
            }
        }
        maven { url 'https://www.jitpack.io' }
    }
}

// Include the React Native Gradle Plugin
includeBuild('../node_modules/@react-native/gradle-plugin')

rootProject.name = "Confio"
include(":app")

include ':didit-sdk-react-native'
project(':didit-sdk-react-native').projectDir = new File(rootProject.projectDir, '../node_modules/@didit-protocol/sdk-react-native/android')
