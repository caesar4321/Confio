<!doctype html>
<html lang="{{ lang }}">
<head>
    <meta charset="utf-8">
    <link rel="icon" type="image/png" href="/images/$CONFIO.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/$CONFIO.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/$CONFIO.png">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="{{ ogDescription }}">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://confio.lat/">

    <meta property="og:title" content="{{ title }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://confio.lat/">
    <meta property="og:image" content="https://confio.lat/static/images/ConfioApp.jpeg">
    <meta property="og:description" content="{{ ogDescription }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@confio4world">
    <meta name="twitter:creator" content="@confio4world">

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "Organization",
                "@id": "https://confio.lat/#organization",
                "name": "Confío",
                "alternateName": ["Confio", "$CONFIO"],
                "url": "https://confio.lat/",
                "logo": {
                    "@type": "ImageObject",
                    "url": "{{ organization_schema.logo_url }}"
                },
                "description": "Non-custodial digital dollar wallet for Latin America built on the Algorand blockchain.",
                "foundingDate": "2024",
                "founder": { "@id": "https://confio.lat/about/julian-moon/#person" },
                "sameAs": [
                    {% for link in organization_schema.same_as %}"{{ link.url }}"{% if not forloop.last %}, {% endif %}{% endfor %}
                ]
            },
            {
                "@type": "WebSite",
                "@id": "https://confio.lat/#website",
                "url": "https://confio.lat/",
                "name": "Confío",
                "description": "{{ ogDescription|escapejs }}",
                "inLanguage": ["es", "en", "ko"],
                "publisher": { "@id": "https://confio.lat/#organization" }
            },
            {
                "@type": "Person",
                "@id": "https://confio.lat/about/julian-moon/#person",
                "name": "Julian Moon",
                "url": "https://confio.lat/about/julian-moon/",
                "jobTitle": "Founder",
                "nationality": "Korean",
                "worksFor": { "@id": "https://confio.lat/#organization" },
                "sameAs": [
                    "https://tiktok.com/@julianmoonluna",
                    "https://youtube.com/@julianmoonluna",
                    "https://instagram.com/julianmoonluna_",
                    "https://facebook.com/julianmoonluna",
                    "https://x.com/julianmoonluna_",
                    "https://t.me/julianmoonluna",
                    "https://linkedin.com/in/julianmoonluna"
                ]
            }
        ]
    }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="/images/$CONFIO.png">
    <link rel="manifest" href="/manifest.json">
    <title>{{ title }}</title>
    {% if main_css_url %}<link href="{{ main_css_url }}" rel="stylesheet">{% endif %}
    {% if main_js_url %}<script defer src="{{ main_js_url }}"></script>{% endif %}
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
