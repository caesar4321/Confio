<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}Confío{% endblock %}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{% block canonical_url %}https://confio.lat/{% endblock %}">
    <meta name="author" content="{% block meta_author %}Confío{% endblock %}">
    <meta name="publisher" content="{% block meta_publisher %}Confío{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Confío{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Confío{% endblock %}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:url" content="{% block og_url %}{% block canonical_url_og %}https://confio.lat/{% endblock %}{% endblock %}">
    <meta property="og:image" content="{% block og_image %}https://confio.lat/static/images/ConfioApp.jpeg{% endblock %}">
    <title>{% block title %}Confío{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    {% block structured_data %}{% endblock %}
    {% block extra_style %}{% endblock %}
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #F8FAFC;
            color: #1F2937;
        }

        .legal-container {
            max-width: 820px;
            margin: 0 auto;
            padding: 48px 20px 64px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #111827;
        }

        h2 {
            font-size: 1.1rem;
            margin: 1.75rem 0 0.75rem;
            color: #111827;
        }

        p, li {
            font-size: 0.96rem;
            line-height: 1.75;
            color: #475467;
        }

        ul {
            padding-left: 1.35rem;
        }

        .last-updated {
            margin-bottom: 1.5rem;
            color: #667085;
            font-size: 0.9rem;
        }

        .back-link {
            margin-top: 2rem;
        }

        .back-link a {
            color: #1DB587;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
</body>
</html>
