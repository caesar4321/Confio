[profile.default]
src = "."
test = "test"
out = "out"
cache_path = "cache"
libs = ["node_modules", "lib"]
optimizer = true
optimizer_runs = 200
# Draft targets ^0.8.24; pin one compiler for reproducible builds
solc = "0.8.26"
# Differential vectors generated by test/mirror/mirror_accrual.py
fs_permissions = [{ access = "read", path = "./test/mirror/vectors.json" }]

[fuzz]
runs = 512

[invariant]
runs = 48
depth = 96
# Liveness discipline: ANY unexpected revert inside a handler op fails the
# run — the handler bounds inputs so every legitimate action MUST succeed.
# This is what the seeded fuzz (try/catch) could not prove.
fail_on_revert = true
